<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acessando...</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  color: #00ff88;
  font-family: monospace;
}

/* MATRIX */
#matrix {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

/* TEXTO */
.hack-texto {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* PONTOS */
.dots::after {
  content: '';
  animation: pontos 1.5s infinite;
}

@keyframes pontos {
  0% { content: ''; }
  33% { content: '.'; }
  66% { content: '..'; }
  100% { content: '...'; }
}

/* ACESSO LIBERADO */
.liberado {
  opacity: 0;
  font-size: 24px;
  margin-top: 10px;
  animation: aparecer 0.5s forwards;
}

@keyframes aparecer {
  to {
    opacity: 1;
    transform: scale(1.2);
  }
}

/* FLASH */
.flash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="hack-texto">
  <h1>🔓 Acessando sistema</h1>
  <p>Injetando dados<span class="dots"></span></p>
  <p id="contador">3</p>
  <p id="liberado" class="liberado">🔓 ACESSO LIBERADO!</p>
</div>

<audio id="somLiberado" src="som.mp3"></audio>
<div id="flash" class="flash"></div>

<script>
// MATRIX
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function ajustarCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
ajustarCanvas();
window.addEventListener("resize", ajustarCanvas);

const letras = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const tamanho = 16;
let colunas = Math.floor(canvas.width / tamanho);
let gotas = Array(colunas).fill(1);

function desenhar() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ff88";
  ctx.font = tamanho + "px monospace";

  for (let i = 0; i < gotas.length; i++) {
    const texto = letras.charAt(Math.floor(Math.random() * letras.length));
    ctx.fillText(texto, i * tamanho, gotas[i] * tamanho);

    if (gotas[i] * tamanho > canvas.height && Math.random() > 0.975) {
      gotas[i] = 0;
    }

    gotas[i]++;
  }
}

setInterval(desenhar, 50);


// CONTADOR
let tempo = 3;
const contador = document.getElementById("contador");
const liberado = document.getElementById("liberado");
const flash = document.getElementById("flash");
const som = document.getElementById("somLiberado");

const intervalo = setInterval(() => {
  tempo--;
  contador.innerText = tempo;

  // quando chega a 1
  if (tempo === 1) {
    liberado.style.opacity = "1";

    // som
    if (som) {
      som.play().catch(() => {});
    }

    // vibração (telemóvel)
    if (navigator.vibrate) {
      navigator.vibrate([200, 100, 200]);
    }

    // flash
    flash.style.opacity = "1";
    setTimeout(() => {
      flash.style.opacity = "0";
    }, 150);
  }

  // quando termina
  if (tempo <= 0) {
    clearInterval(intervalo);

    setTimeout(() => {
      window.location.href = "index.html";
    }, 1000);
  }

}, 1000);
</script>

</body>
</html>
