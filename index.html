<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Acessando...</title>

<style>
body{
  margin: 0;
  background: black;
  color: #00ff88;
  font-family: monospace;
  overflow: hidden;
}

canvas{
  position: fixed;
  top: 0;
  left: 0;
}

.hack-text{
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="hack-text">
  <h1>🔒 Acessando sistema</h1>
  <p>Injetando dados...</p>
  <p id="contador">3</p>
  <p id="liberado" style="opacity:0;">🔓 ACESSO LIBERADO</p>
</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letras = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const tamanho = 16;
const colunas = canvas.width / tamanho;
const gotas = Array(Math.floor(colunas)).fill(1);

function desenhar(){
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff88";
  ctx.font = tamanho + "px monospace";

  for(let i = 0; i < gotas.length; i++){
    const texto = letras.charAt(Math.floor(Math.random() * letras.length));
    ctx.fillText(texto, i * tamanho, gotas[i] * tamanho);

    if(gotas[i] * tamanho > canvas.height && Math.random() > 0.975){
      gotas[i] = 0;
    }
    gotas[i]++;
  }
}

setInterval(desenhar, 50);

// CONTADOR
let tempo = 3;
const contador = document.getElementById("contador");
const liberado = document.getElementById("liberado");

const intervalo = setInterval(() => {
  tempo--;
  contador.innerText = tempo;

  if(tempo <= 0){
    clearInterval(intervalo);
    liberado.style.opacity = "1";

    setTimeout(() => {
      window.location.href = "home.html";
    }, 2000);
  }
}, 1000);
</script>

</body>
</html>
